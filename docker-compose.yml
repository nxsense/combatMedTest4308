services:
  postgres:
    image: postgres:17
    container_name: combatmed-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - combatmed_pg_data:/var/lib/postgresql/data

volumes:
  combatmed_pg_data: